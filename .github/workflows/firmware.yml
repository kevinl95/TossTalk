name: Firmware CI

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'scripts/**'
      - '.github/workflows/firmware.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - 'scripts/**'
      - '.github/workflows/firmware.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run

      - name: Merge firmware image
        run: |
          python ../scripts/merge_firmware.py \
            --env-dir .pio/build/m5stick-c-plus2 \
            --out .pio/build/m5stick-c-plus2/tosstalk-merged.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: |
            firmware/.pio/build/m5stick-c-plus2/firmware.bin
            firmware/.pio/build/m5stick-c-plus2/bootloader.bin
            firmware/.pio/build/m5stick-c-plus2/partitions.bin
            firmware/.pio/build/m5stick-c-plus2/tosstalk-merged.bin